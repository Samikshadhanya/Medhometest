name: Workflow for Load Testing
run-name: Workflow for Load Testing

on:
  push:
  workflow_dispatch:

jobs:
  # Single combined load test job — runs ALL 350 tests (Web/Backend + App/Appium)
  # and generates ONE plain Excel report matching the Selenium/Appium report format.
  #
  #   Category 1-5 Core Performance Tests : 25 tests
  #   Extended Web/Backend Load Tests     : 175 tests
  #   App/Appium Load Performance Tests   : 150 tests
  #   ────────────────────────────────────────────────
  #   Total                               : 350 tests
  #
  load-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install aiohttp openpyxl

      - name: Run Full Load Test Suite (350 tests — Web/Backend 200 + App/Appium 150)
        run: |
          python tests/load_testing/enhanced_load_test_runner.py

      - name: Upload Combined Load Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: tests/load_testing/Load_Test_Report_*.xlsx
          retention-days: 30
