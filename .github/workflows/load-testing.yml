name: Workflow for Load Testing
run-name: Workflow for Load Testing

on:
  push:
    paths:
      - 'tests/load_testing/**'
      - '.github/workflows/load-testing.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  load-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install aiohttp openpyxl

      - name: Run Load Testing Suite
        run: |
          python tests/load_testing/load_test_runner.py

      - name: Upload Load Test Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: tests/load_testing/*.xlsx
