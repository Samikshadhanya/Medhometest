name: Enhanced Load Testing Pipeline
run-name: Enhanced Load Testing Pipeline

on:
  push:
    paths:
      - 'tests/load_testing/**'
      - '.github/workflows/load-testing.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  enhanced-load-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install aiohttp openpyxl

      - name: Run Enhanced Load Testing Suite
        run: |
          python tests/load_testing/enhanced_load_test_runner.py

      - name: Upload Enhanced Load Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enhanced-load-test-report
          path: |
            tests/load_testing/Enhanced_Load_Test_Report_*.xlsx
            tests/load_testing/enhanced_load_report.json
          retention-days: 30
