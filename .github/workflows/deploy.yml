name: pages deployment

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyAV9r7a6g7f-CEwUltCelIWd-gGEhNdurM"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "medhome-e2dd2.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "medhome-e2dd2"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "medhome-e2dd2.firebasestorage.app"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "345713405310"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:345713405310:web:de1a8e4e0d2852b136972f"
          NEXT_PUBLIC_APP_URL: "https://samikshadhanya.github.io/Medhometest"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
